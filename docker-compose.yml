services:
  minio:
    image: minio/minio:latest
    container_name: nimbusu-minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot container that creates the default bucket then exits
  minio-init:
    image: minio/mc:latest
    container_name: nimbusu-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set nimbusu http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing nimbusu/nimbusu-media;
        mc anonymous set download nimbusu/nimbusu-media;
        echo 'Bucket nimbusu-media is ready';
      "

volumes:
  minio-data:

        docs:
          type: object
          additionalProperties: {}
      required:
      - docs
      - endpoints
      - message
      - status
    Announcement:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 300
        body:
          type: string
        created_by:
          type: string
          format: uuid
          readOnly: true
        created_by_name:
          type: string
          readOnly: true
        target_type:
          $ref: '#/components/schemas/TargetTypeEnum'
        target_id:
          type: string
          format: uuid
          nullable: true
        is_urgent:
          type: boolean
        publish_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - created_at
      - created_by
      - created_by_name
      - id
      - target_type
      - title
    AnnouncementRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        body:
          type: string
          minLength: 1
        target_type:
          $ref: '#/components/schemas/TargetTypeEnum'
        target_id:
          type: string
          format: uuid
          nullable: true
        is_urgent:
          type: boolean
        publish_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_published:
          type: boolean
      required:
      - body
      - target_type
      - title
    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 300
        description:
          type: string
          nullable: true
        course_offering:
          type: string
          format: uuid
        course_name:
          type: string
          readOnly: true
        created_by:
          type: string
          format: uuid
          readOnly: true
        created_by_name:
          type: string
          readOnly: true
        due_date:
          type: string
          format: date-time
        max_marks:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        assignment_type:
          $ref: '#/components/schemas/AssignmentTypeEnum'
        attachments:
          nullable: true
        is_published:
          type: boolean
        submission_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - course_name
      - course_offering
      - created_at
      - created_by
      - created_by_name
      - due_date
      - id
      - max_marks
      - submission_count
      - title
      - updated_at
    AssignmentRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          nullable: true
        course_offering:
          type: string
          format: uuid
        due_date:
          type: string
          format: date-time
        max_marks:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,2})?$
        assignment_type:
          $ref: '#/components/schemas/AssignmentTypeEnum'
        attachments:
          nullable: true
        is_published:
          type: boolean
      required:
      - course_offering
      - due_date
      - max_marks
      - title
    AssignmentTypeEnum:
      enum:
      - assignment
      - quiz
      - exam
      - project
      type: string
      description: |-
        * `assignment` - Assignment
        * `quiz` - Quiz
        * `exam` - Exam
        * `project` - Project
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        timetable_entry:
          type: string
          format: uuid
        student:
          type: string
          format: uuid
        student_name:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        status:
